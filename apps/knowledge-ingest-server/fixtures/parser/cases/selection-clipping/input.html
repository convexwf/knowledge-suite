<!doctype html>
<html lang="en">
  <head>
    <title>Selection Clipping</title>
  </head>
  <body>
    <article>
      <h1>Selection Clipping</h1>
      <p>Unselected introduction should not be saved when a useful selection candidate is present.</p>
      <section>
        <h2>Selected Passage</h2>
        <p>The selected passage is intentionally long enough to become a parser candidate and preserve the local context chosen by the reader.</p>
        <blockquote>Selection keeps quoted material</blockquote>
      </section>
    </article>
  </body>
