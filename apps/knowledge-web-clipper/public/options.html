<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knowledge Web Clipper Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options-shell">
      <header class="page-header">
        <div>
          <h1>Knowledge Web Clipper Settings</h1>
          <p>Extension version <span id="extension-version">0.1.0</span></p>
        </div>
        <button id="test-connection" type="button">Test Connection</button>
      </header>

      <form id="settings-form" class="settings-form">
        <section class="settings-section">
          <h2>Server</h2>
          <div class="field-grid">
            <label>
              Server URL
              <input id="server-url" type="url" placeholder="http://127.0.0.1:18765" />
            </label>
            <label>
              Server Token
              <input id="server-token" type="password" autocomplete="off" />
            </label>
            <label>
              Request Timeout
              <input id="request-timeout-ms" type="number" min="3000" max="60000" step="1000" />
            </label>
          </div>
        </section>

        <section class="settings-section">
          <h2>Clipping</h2>
          <div class="field-grid">
            <label>
              Default Input Mode
              <select id="default-input-mode">
                <option value="browser_html">Current HTML</option>
                <option value="server_fetch">Server Fetch</option>
              </select>
            </label>
            <label>
              Saved List Limit
              <input id="saved-list-limit" type="number" min="10" max="200" step="10" />
            </label>
            <label>
              Default Panel Tab
              <select id="default-panel-tab">
                <option value="preview">Preview</option>
                <option value="json">JSON</option>
                <option value="rawdoc">RawDoc</option>
                <option value="parser">Parser</option>
                <option value="saved">Saved</option>
              </select>
            </label>
          </div>
          <div class="toggle-list" aria-label="Clipping behavior switches">
            <label class="toggle-row">
              <span>
                <strong>Allow Server Fetch mode</strong>
                <span class="toggle-description">
                  Enable the side panel mode where the local server fetches the current URL by itself. Local
                  <code>file://</code> pages still use Current HTML because the server cannot read browser-only local files.
                </span>
              </span>
              <input id="allow-server-fetch" type="checkbox" />
            </label>
            <label class="toggle-row">
              <span>
                <strong>Auto refresh when the active tab changes</strong>
                <span class="toggle-description">
                  Re-run preview automatically after switching tabs or after the current tab finishes loading. Turn this off
                  when you want preview to update only after pressing Refresh.
                </span>
              </span>
              <input id="auto-refresh" type="checkbox" />
            </label>
            <label class="toggle-row">
              <span>
                <strong>Check server health before parsing</strong>
                <span class="toggle-description">
                  Verify the local server is reachable before previewing or saving. This gives clearer errors for wrong URL,
                  token, or Docker startup issues, with a small extra request before each parse.
                </span>
              </span>
              <input id="health-check-on-open" type="checkbox" />
            </label>
            <label class="toggle-row">
              <span>
                <strong>Delete generated files with clip records</strong>
                <span class="toggle-description">
                  When deleting the current URL from Saved, also remove its raw HTML, RawDoc JSON, Document JSON, and
                  Markdown files. Turn this off only if you want the database record removed but object files kept.
                </span>
              </span>
              <input id="delete-files-by-default" type="checkbox" />
            </label>
            <label class="toggle-row">
              <span>
                <strong>Show parser diagnostics tab</strong>
                <span class="toggle-description">
                  Show the Parser tab in the side panel with extraction method, adapter matches, candidate scores, and
                  warnings. Useful while improving extraction quality; optional for daily clipping.
                </span>
              </span>
              <input id="show-parser-diagnostics" type="checkbox" />
            </label>
          </div>
        </section>

        <section class="settings-section">
          <h2>Status</h2>
          <div id="status-output" class="status-output"></div>
        </section>

        <footer class="form-actions">
          <button id="reset-settings" type="button">Reset</button>
          <button type="submit">Save Settings</button>
        </footer>
      </form>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
