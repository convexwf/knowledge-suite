<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knowledge Web Clipper</title>
    <link rel="stylesheet" href="vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="side-panel.css" />
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1 id="page-title">Knowledge</h1>
          <p id="page-url">No active page</p>
        </div>
        <div class="header-actions">
          <button id="refresh-button" title="Refresh preview">Refresh</button>
          <details id="more-menu" class="more-menu">
            <summary title="More actions">More</summary>
            <div class="more-menu-panel">
              <button id="mode-browser" type="button">Use Current HTML</button>
              <button id="mode-fetch" type="button">Use Server Fetch</button>
              <button id="copy-button" type="button">Copy Markdown</button>
              <button id="diagnostics-button" type="button">Diagnostics</button>
              <button id="remove-button" type="button">Remove Parsed Result</button>
              <button id="purge-button" type="button">Purge Capture</button>
              <button id="settings-button" type="button">Settings</button>
            </div>
          </details>
        </div>
      </header>

      <section class="toolbar">
        <div class="tab-strip">
          <button id="tab-preview" data-active="true">Preview</button>
          <button id="tab-saved">Saved</button>
        </div>
        <div class="toolbar-actions">
          <div class="toolbar-status">
            <span id="status-pill">Idle</span>
          </div>
          <div class="save-button-group">
          <button id="save-button" class="primary-action">Save</button>
          <button id="save-dropdown" class="save-dropdown" title="More save options">▾</button>
          <div id="save-dropdown-menu" class="save-dropdown-menu" hidden>
            <button id="save-section-button" type="button">Save Section</button>
          </div>
        </div>
        </div>
      </section>

      <section id="diagnostics-toggle-row" class="diagnostics-toggle-row">
        <button
          id="diagnostics-toggle"
          class="diagnostics-toggle"
          type="button"
          title="Show diagnostics"
          aria-label="Show diagnostics"
          aria-controls="diagnostics-tabs"
          aria-expanded="false"
        >
          <span class="diagnostics-chevron" aria-hidden="true"></span>
        </button>
      </section>

      <section id="diagnostics-tabs" class="diagnostics-tabs" hidden>
        <button id="tab-parser">Parser</button>
        <button id="tab-json">JSON</button>
        <button id="tab-rawdoc">RawDoc</button>
      </section>

      <section id="candidate-control" class="candidate-control" hidden>
        <label>
          Candidate Preview
          <select id="candidate-select"></select>
        </label>
      </section>

      <article id="preview-output" class="preview-output"></article>
      <pre id="code-output" class="code-output" hidden></pre>
      <pre id="rawdoc-output" class="code-output" hidden></pre>
      <div id="parser-output" class="parser-output" hidden></div>
      <div id="saved-list" class="saved-list" hidden></div>

      <aside id="status-toast" class="status-toast" hidden aria-live="polite">
        <span id="status-detail">Ready</span>
      </aside>

      <div id="batch-modal" class="batch-modal" hidden>
        <div class="batch-modal-overlay"></div>
        <div class="batch-modal-content" role="dialog" aria-label="Save Section">
          <div class="batch-modal-header">
            <span class="batch-modal-title">Save Section</span>
            <button id="batch-modal-close" class="batch-modal-close" title="Close">&times;</button>
          </div>
          <div id="batch-modal-body" class="batch-modal-body"></div>
        </div>
      </div>
    </main>
    <script src="vendor/katex/katex.min.js"></script>
    <script src="vendor/markdown-it/markdown-it.min.js"></script>
    <script src="vendor/dompurify/purify.min.js"></script>
    <script type="module" src="side-panel.js"></script>
  </body>
</html>
