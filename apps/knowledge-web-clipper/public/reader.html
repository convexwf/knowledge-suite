<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knowledge Reader</title>
    <link rel="stylesheet" href="reader.css" />
  </head>
  <body>
    <main class="reader-shell">
      <header class="reader-header">
        <div class="title-block">
          <p id="reader-kicker">Reader</p>
          <h1 id="reader-title">Loading...</h1>
          <div id="reader-meta" class="reader-meta"></div>
        </div>
        <div class="reader-actions">
          <button id="back-to-items" type="button">Items</button>
          <button id="copy-markdown" type="button">Copy Markdown</button>
          <button id="reparse-item" type="button">Reparse</button>
          <button id="ai-summarize" type="button">AI Summary</button>
        </div>
      </header>

      <nav id="collection-nav" class="collection-nav" aria-label="Collection navigation" hidden>
        <button id="prev-in-collection" type="button" hidden aria-label="Previous in collection">&larr;<span>Prev</span></button>
        <button id="next-in-collection" type="button" hidden aria-label="Next in collection"><span>Next</span>&rarr;</button>
      </nav>

      <section class="reader-facts" aria-label="Document summary">
        <article class="reader-fact">
          <span class="reader-fact-label">Source</span>
          <strong id="reader-source" class="reader-fact-value">-</strong>
        </article>
        <article class="reader-fact">
          <span class="reader-fact-label">Reader State</span>
          <strong id="reader-state" class="reader-fact-value">-</strong>
        </article>
        <article class="reader-fact">
          <span class="reader-fact-label">Collection</span>
          <strong id="reader-collection" class="reader-fact-value">-</strong>
        </article>
        <article class="reader-fact">
          <span class="reader-fact-label">Annotations</span>
          <strong id="reader-annotation-count" class="reader-fact-value">0</strong>
        </article>
      </section>

      <section id="reader-layout" class="reader-layout">
        <aside class="outline-panel" aria-label="Document outline">
          <div class="outline-header">
            <h2>Outline</h2>
            <button id="outline-collapse-toggle" type="button">Collapse all</button>
          </div>
          <nav id="outline-list"></nav>
        </aside>
        <article id="reader-content" class="reader-content"></article>
        <aside id="annotation-panel" class="annotation-panel collapsed" aria-label="Annotations">
          <div class="annotation-header">
            <button id="annotation-panel-toggle" class="panel-toggle" type="button" data-collapsed="true" title="Toggle annotations">▶</button>
            <h2>Annotations</h2>
          </div>
          <div id="annotation-body" class="panel-body" hidden>
            <div id="annotation-sidebar"></div>
          </div>
        </aside>
      </section>
    </main>
    <div id="ai-dialog" class="ai-dialog" hidden>
      <div class="ai-dialog-content">
        <h2>Generate AI Summaries</h2>
        <p class="ai-dialog-desc">Select headings to summarize. Summary scope covers the heading and all its sub-sections.</p>
        <div id="ai-heading-list" class="ai-heading-list"></div>
        <div id="ai-progress" class="ai-progress" hidden>
          <span id="ai-progress-text"></span>
          <progress id="ai-progress-bar" value="0" max="100"></progress>
        </div>
        <div class="ai-dialog-actions">
          <button id="ai-select-all" type="button">Select All H1</button>
          <button id="ai-deselect-all" type="button">Deselect All</button>
          <button id="ai-generate" type="button">Generate</button>
          <button id="ai-cancel" type="button">Cancel</button>
        </div>
      </div>
    </div>
    <div id="ai-overlay" class="ai-overlay" hidden></div>
    <button id="back-to-top" class="back-to-top" type="button" hidden>Back to top</button>
    <script type="module" src="reader.js"></script>
  </body>
</html>
