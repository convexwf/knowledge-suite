<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Annotations</title>
    <link rel="stylesheet" href="annotations.css" />
  </head>
  <body>
    <div class="anno-layout">
      <nav class="anno-nav">
        <div class="anno-nav-header">
          <button id="back-to-items" type="button">← Back</button>
          <h2>Annotations</h2>
          <p class="anno-nav-copy">Browse notes, highlights, and AI summaries across saved documents.</p>
        </div>
        <section class="anno-nav-stats" aria-label="Annotation overview">
          <article class="anno-nav-stat">
            <span class="anno-nav-stat-label">Documents</span>
            <strong id="anno-doc-count" class="anno-nav-stat-value">0</strong>
          </article>
          <article class="anno-nav-stat">
            <span class="anno-nav-stat-label">Annotations</span>
            <strong id="anno-total-count" class="anno-nav-stat-value">0</strong>
          </article>
        </section>
        <div id="anno-nav-list" class="anno-nav-list" role="listbox"></div>
      </nav>
      <main class="anno-detail" id="anno-detail">
        <div class="anno-detail-empty">
          Select a document from the left to view its annotations.
        </div>
      </main>
    </div>
    <script type="module" src="annotations.js"></script>
  </body>
</html>
