<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Annotations</title>
    <link rel="stylesheet" href="annotations.css" />
  </head>
  <body>
    <main class="anno-shell">
      <header class="anno-header">
        <button id="back-to-items" type="button">← Back to Items</button>
        <div class="anno-title-block">
          <h1 id="anno-title">Annotations</h1>
          <p id="anno-subtitle"></p>
        </div>
      </header>

      <div id="anno-toolbar" class="anno-toolbar">
        <div id="anno-filter" class="anno-filter"></div>
        <button id="anno-delete-all" class="anno-delete-all danger-button" type="button" hidden>Delete All</button>
      </div>

      <div id="anno-list" class="anno-list" aria-live="polite"></div>
      <div id="anno-empty" class="anno-empty" hidden>No annotations found for this document.</div>
    </main>
    <script type="module" src="annotations.js"></script>
  </body>
</html>
